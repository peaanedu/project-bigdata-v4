services:
  postgres:
    image: postgres:15
    container_name: postgres-metastore
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [bigdata]

  namenode:
    image: apache/hadoop:3.4.3
    container_name: namenode
    restart: unless-stopped
    hostname: namenode
    environment:
      TZ: ${TZ}
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
      HADOOP_LOG_DIR: /opt/hadoop/logs
      CLUSTER_NAME: bigdata-v4
    ports:
      - "${NAMENODE_HTTP_PORT}:9870"
      - "${NAMENODE_RPC_PORT}:9000"
    volumes:
      - namenode_data:/data/hdfs/name
      - ./hadoop/conf:/opt/hadoop/etc/hadoop:ro
      - ./hadoop/bin/start-namenode.sh:/opt/bootstrap/start-namenode.sh:ro
    command: ["bash", "/opt/bootstrap/start-namenode.sh"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9870/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks: [bigdata]

  secondarynamenode:
    image: apache/hadoop:3.4.3
    container_name: secondarynamenode
    restart: unless-stopped
    hostname: secondarynamenode
    depends_on:
      namenode:
        condition: service_healthy
    environment:
      TZ: ${TZ}
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
      HADOOP_LOG_DIR: /opt/hadoop/logs
    volumes:
      - secondarynamenode_data:/data/hdfs/namesecondary
      - ./hadoop/conf:/opt/hadoop/etc/hadoop:ro
      - ./hadoop/bin/start-secondarynamenode.sh:/opt/bootstrap/start-secondarynamenode.sh:ro
    command: ["bash", "/opt/bootstrap/start-secondarynamenode.sh"]
    networks: [bigdata]

  datanode1:
    image: apache/hadoop:3.4.3
    container_name: datanode1
    restart: unless-stopped
    hostname: datanode1
    depends_on:
      namenode:
        condition: service_healthy
    environment:
      TZ: ${TZ}
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
      HADOOP_LOG_DIR: /opt/hadoop/logs
    ports:
      - "9865:9864"
    volumes:
      - datanode1_data:/data/hdfs/data
      - ./hadoop/conf:/opt/hadoop/etc/hadoop:ro
      - ./hadoop/bin/start-datanode.sh:/opt/bootstrap/start-datanode.sh:ro
    command: ["bash", "/opt/bootstrap/start-datanode.sh"]
    networks: [bigdata]

  datanode2:
    image: apache/hadoop:3.4.3
    container_name: datanode2
    restart: unless-stopped
    hostname: datanode2
    depends_on:
      namenode:
        condition: service_healthy
    environment:
      TZ: ${TZ}
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
      HADOOP_LOG_DIR: /opt/hadoop/logs
    ports:
      - "9866:9864"
    volumes:
      - datanode2_data:/data/hdfs/data
      - ./hadoop/conf:/opt/hadoop/etc/hadoop:ro
      - ./hadoop/bin/start-datanode.sh:/opt/bootstrap/start-datanode.sh:ro
    command: ["bash", "/opt/bootstrap/start-datanode.sh"]
    networks: [bigdata]

  resourcemanager:
    image: apache/hadoop:3.4.3
    container_name: resourcemanager
    restart: unless-stopped
    hostname: resourcemanager
    depends_on:
      namenode:
        condition: service_healthy
      datanode1:
        condition: service_started
      datanode2:
        condition: service_started
    environment:
      TZ: ${TZ}
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
      HADOOP_LOG_DIR: /opt/hadoop/logs
    ports:
      - "${YARN_RM_PORT}:8088"
    volumes:
      - ./hadoop/conf:/opt/hadoop/etc/hadoop:ro
      - ./hadoop/bin/start-resourcemanager.sh:/opt/bootstrap/start-resourcemanager.sh:ro
    command: ["bash", "/opt/bootstrap/start-resourcemanager.sh"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8088/ws/v1/cluster/info >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks: [bigdata]

  nodemanager1:
    image: apache/hadoop:3.4.3
    container_name: nodemanager1
    restart: unless-stopped
    hostname: nodemanager1
    depends_on:
      resourcemanager:
        condition: service_healthy
    environment:
      TZ: ${TZ}
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
      HADOOP_LOG_DIR: /opt/hadoop/logs
    ports:
      - "8043:8042"
    volumes:
      - nodemanager1_data:/data/yarn/nm
      - ./hadoop/conf:/opt/hadoop/etc/hadoop:ro
      - ./hadoop/bin/start-nodemanager.sh:/opt/bootstrap/start-nodemanager.sh:ro
    command: ["bash", "/opt/bootstrap/start-nodemanager.sh"]
    networks: [bigdata]

  nodemanager2:
    image: apache/hadoop:3.4.3
    container_name: nodemanager2
    restart: unless-stopped
    hostname: nodemanager2
    depends_on:
      resourcemanager:
        condition: service_healthy
    environment:
      TZ: ${TZ}
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
      HADOOP_LOG_DIR: /opt/hadoop/logs
    ports:
      - "8044:8042"
    volumes:
      - nodemanager2_data:/data/yarn/nm
      - ./hadoop/conf:/opt/hadoop/etc/hadoop:ro
      - ./hadoop/bin/start-nodemanager.sh:/opt/bootstrap/start-nodemanager.sh:ro
    command: ["bash", "/opt/bootstrap/start-nodemanager.sh"]
    networks: [bigdata]

  historyserver:
    image: apache/hadoop:3.4.3
    container_name: historyserver
    restart: unless-stopped
    hostname: historyserver
    depends_on:
      namenode:
        condition: service_healthy
      resourcemanager:
        condition: service_healthy
    environment:
      TZ: ${TZ}
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
      HADOOP_LOG_DIR: /opt/hadoop/logs
    ports:
      - "${MAPRED_HISTORY_PORT}:19888"
    volumes:
      - historyserver_data:/data/mapred/history
      - ./hadoop/conf:/opt/hadoop/etc/hadoop:ro
      - ./hadoop/bin/start-historyserver.sh:/opt/bootstrap/start-historyserver.sh:ro
    command: ["bash", "/opt/bootstrap/start-historyserver.sh"]
    networks: [bigdata]

  hive-metastore:
    image: apache/hive:4.1.0
    container_name: hive-metastore
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      namenode:
        condition: service_healthy
      datanode1:
        condition: service_started
      datanode2:
        condition: service_started
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      HADOOP_HOME: /opt/hadoop
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
        -Djavax.jdo.option.ConnectionUserName=${POSTGRES_USER}
        -Djavax.jdo.option.ConnectionPassword=${POSTGRES_PASSWORD}
        -Dhive.metastore.warehouse.dir=hdfs://namenode:9000/user/hive/warehouse
      TZ: ${TZ}
    ports:
      - "${HIVE_METASTORE_PORT}:9083"
    volumes:
      - ./hive/conf/hive-site.xml:/opt/hive/conf/hive-site.xml:ro
      - ./hadoop/conf:/opt/hadoop/etc/hadoop:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/9083' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks: [bigdata]

  hiveserver2:
    image: apache/hive:4.1.0
    container_name: hiveserver2
    restart: unless-stopped
    depends_on:
      hive-metastore:
        condition: service_healthy
    environment:
      SERVICE_NAME: hiveserver2
      IS_RESUME: "true"
      HADOOP_HOME: /opt/hadoop
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
      SERVICE_OPTS: >-
        -Dhive.metastore.uris=thrift://hive-metastore:9083
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
        -Djavax.jdo.option.ConnectionUserName=${POSTGRES_USER}
        -Djavax.jdo.option.ConnectionPassword=${POSTGRES_PASSWORD}
        -Dhive.server2.enable.doAs=false
      TZ: ${TZ}
    ports:
      - "${HIVE_SERVER_PORT}:10000"
      - "10002:10002"
    volumes:
      - ./hive/conf/hive-site.xml:/opt/hive/conf/hive-site.xml:ro
      - ./hadoop/conf:/opt/hadoop/etc/hadoop:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/10000' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks: [bigdata]

  trino:
    image: trinodb/trino:472
    container_name: trino
    restart: unless-stopped
    depends_on:
      hive-metastore:
        condition: service_healthy
      namenode:
        condition: service_healthy
    ports:
      - "${TRINO_HTTP_PORT}:8080"
    volumes:
      - ./trino/etc:/etc/trino:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/v1/info >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks: [bigdata]

  spark-master:
    image: bitnami/spark:latest
    container_name: spark-master
    restart: unless-stopped
    depends_on:
      namenode:
        condition: service_healthy
      resourcemanager:
        condition: service_healthy
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      HADOOP_CONF_DIR: /opt/bitnami/spark/conf/hadoop-conf
      TZ: ${TZ}
    ports:
      - "7077:7077"
      - "${SPARK_MASTER_UI_PORT}:8080"
    volumes:
      - ./spark/conf/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf:ro
      - ./hadoop/conf:/opt/bitnami/spark/conf/hadoop-conf:ro
    networks: [bigdata]

  spark-worker:
    image: bitnami/spark:latest
    container_name: spark-worker
    restart: unless-stopped
    depends_on:
      - spark-master
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      HADOOP_CONF_DIR: /opt/bitnami/spark/conf/hadoop-conf
      TZ: ${TZ}
    ports:
      - "${SPARK_WORKER_UI_PORT}:8081"
    volumes:
      - ./spark/conf/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf:ro
      - ./hadoop/conf:/opt/bitnami/spark/conf/hadoop-conf:ro
    networks: [bigdata]

  jupyter:
    image: quay.io/jupyter/pyspark-notebook:x86_64-python-3.11.6
    container_name: jupyter
    restart: unless-stopped
    depends_on:
      - spark-master
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      SPARK_MASTER: spark://spark-master:7077
      TZ: ${TZ}
    ports:
      - "${JUPYTER_PORT}:8888"
      - "4040:4040"
    volumes:
      - ./jupyter/notebooks:/home/jovyan/work
      - ./datasets:/home/jovyan/work/datasets
      - ./hadoop/conf:/home/jovyan/hadoop-conf:ro
    networks: [bigdata]

networks:
  bigdata:
    driver: bridge

volumes:
  postgres_data:
  namenode_data:
  secondarynamenode_data:
  datanode1_data:
  datanode2_data:
  nodemanager1_data:
  nodemanager2_data:
  historyserver_data:
